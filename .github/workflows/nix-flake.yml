name: "Nix Flake"
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - uses: actions/checkout@v6

    - name: Install lefthook
      run: npm install -g lefthook

    - name: Ensure nix flake builds
      # Wrap in `script` for pseudo-TTY so lefthook streams output
      run: |
        if [ "$(uname)" = "Darwin" ]; then
          script -q /dev/null lefthook run nix-flake-build
        else
          script -qefc 'lefthook run nix-flake-build' /dev/null
        fi
