name: CMake

on:
  push:
    branches: main
  pull_request:
  merge_group:
    branches: main

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  # Minimum coverage thresholds required. Raise these as coverage improves.
  # Measured by LLVM instrumentation across all instrumented binaries.
  # Current measured values: lines ~81%, functions ~85%.
  # Thresholds are set slightly below measured values to absorb minor
  # variation between CI (Ubuntu/gcc) and local (Nix/Clang) environments.
  MIN_LINE_COVERAGE: 80
  MIN_FUNC_COVERAGE: 84

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
            os: ubuntu-latest,
            name: Ubuntu,
            PY_MAJOR: 3,
            cmake_args: -DUSE_PYTHON=ON -DUSE_GPGME=ON
          }
          - {
            os: macos-latest,
            name: MacOS,
            PY_MAJOR: 3,
            cmake_args: -DUSE_PYTHON=ON -DUSE_GPGME=ON
          }
          - {
            os: ubuntu-latest,
            name: Ubuntu-Sanitizers,
            PY_MAJOR: 3,
            cmake_args: -DUSE_SANITIZERS=ON
          }
    steps:
      - uses: actions/checkout@v7
        name: Check out repository code

      - if: runner.os == 'Linux'
        name: Linux dependencies
        run: |
          sudo apt-get update -y
          sudo ./acprep dependencies --python

      - if: runner.os == 'macOS'
        name: Mac Dependencies
        run: |
          # Unlink and re-link to prevent errors when github mac runner images
          # install python outside of brew, for example:
          # https://github.com/orgs/Homebrew/discussions/3895
          # https://github.com/actions/setup-python/issues/577
          # https://github.com/actions/runner-images/issues/6459
          # https://github.com/actions/runner-images/issues/6507
          # https://github.com/actions/runner-images/issues/2322
          brew list -1 | grep python | while read formula; do brew unlink $formula; brew link --overwrite $formula; done

          brew update || brew update || echo "brew update failed (non-fatal, using cached tap)"
          brew uninstall cmake
          ./acprep dependencies --python

      - name: Install lefthook
        run: npm install -g lefthook

      - name: Build and test
        run: lefthook run cmake-build-and-test
        env:
          cmakeFlags: "-DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{matrix.config.cmake_args}} -DPython_FIND_VERSION_MAJOR=${{matrix.config.PY_MAJOR}}"
          ASAN_OPTIONS: ${{ contains(matrix.config.cmake_args, 'USE_SANITIZERS') && 'detect_leaks=1:halt_on_error=0:log_path=/tmp/asan_log' || '' }}
          LSAN_OPTIONS: ${{ contains(matrix.config.cmake_args, 'USE_SANITIZERS') && 'suppressions=../lsan-suppressions.txt:log_path=/tmp/lsan_log' || '' }}
          UBSAN_OPTIONS: ${{ contains(matrix.config.cmake_args, 'USE_SANITIZERS') && 'print_stacktrace=1:halt_on_error=0:suppressions=../ubsan-suppressions.txt:log_path=/tmp/ubsan_log' || '' }}

      - name: Report sanitizer findings
        if: contains(matrix.config.cmake_args, 'USE_SANITIZERS') && always()
        run: |
          echo "=== Sanitizer Report ==="
          found=0
          for prefix in asan_log lsan_log ubsan_log; do
            files=(/tmp/${prefix}.*)
            [ -f "${files[0]}" ] || continue
            echo "--- ${prefix}: ${#files[@]} report(s) ---"
            # Deduplicate: extract unique error summaries
            grep -h "SUMMARY\|ERROR\|runtime error" "${files[@]}" 2>/dev/null | sort -u || true
            echo
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "No sanitizer issues found."
          else
            echo "::warning::Sanitizer issues were detected. See above for details."
          fi

  build-windows:
    # Windows build via MSYS2/UCRT64. Separate job (not part of the build
    # matrix) because Windows needs a different shell, toolchain bootstrap,
    # and dependency install path than Ubuntu/macOS. While the Windows
    # toolchain stabilises, Configure and Build are marked
    # continue-on-error so unrelated PRs are not blocked by Windows-
    # specific regressions. Once the job runs green on a few merges,
    # those flags can be removed.
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
        name: Check out repository code

      - uses: msys2/setup-msys2@v2
        name: Set up MSYS2 (UCRT64)
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-gmp
            mingw-w64-ucrt-x86_64-mpfr
            mingw-w64-ucrt-x86_64-icu

      - name: Configure CMake
        continue-on-error: true
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DUSE_PYTHON=OFF \
            -DUSE_GPGME=OFF

      - name: Build
        continue-on-error: true
        run: cmake --build build

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        # LLVM coverage instrumentation generates several GB of .profraw data
        # across the full test suite; the default ubuntu-latest image has been
        # running out of disk space mid-test, aborting the runner with
        # "No space left on device".  GitHub provisions the ubuntu-latest
        # image with either ~145 GB or ~72 GB of root disk depending on
        # availability, so we clean aggressively here to leave headroom on
        # the smaller variant.  Remove preinstalled toolchains that this job
        # does not need; only target known-unrelated stacks (do not touch
        # /usr/local/share/boost or /usr/local/share/cmake — apt-installed
        # Boost works alongside them but hostedtoolcache provides Python
        # we install via apt instead).
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/google
          # Reclaim space from preinstalled Docker images / containers.
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v7
        name: Check out repository code

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          # acprep dependencies brings in build tools, Boost, Python, etc.
          sudo ./acprep dependencies --python
          # llvm provides llvm-profdata and llvm-cov; lcov provides genhtml.
          sudo apt-get install -y clang llvm lcov

      - name: Configure CMake
        # USE_LLVM_COV uses Clang instrumentation (-fprofile-instr-generate
        # -fcoverage-mapping) instead of gcov, so it works with Clang on all
        # platforms. DISABLE_ASSERTS keeps branch coverage clean.
        run: |
          cmake -B ${{github.workspace}}/build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_LLVM_COV=ON \
            -DUSE_PYTHON=ON \
            -DDISABLE_ASSERTS=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config Debug

      - name: Run tests and generate coverage report
        # The 'coverage' target (from RunCoverage.cmake) runs ctest with
        # LLVM_PROFILE_FILE set, merges profiles, exports to lcov format,
        # and generates the HTML report – all in one step.
        working-directory: ${{github.workspace}}/build
        run: cmake --build . --target coverage

      - name: Check coverage thresholds
        working-directory: ${{github.workspace}}/build
        run: |
          # Parse coverage.info directly to avoid lcov consistency-check errors
          # that arise when processing LLVM-generated data with older lcov versions.
          #   LH / LF  = lines hit / lines found (per file, summed across all files)
          #   FNH / FNF = functions hit / found
          eval "$(awk -F: '
            /^LH:/  { lh += $2 }
            /^LF:/  { lf += $2 }
            /^FNH:/ { fnh += $2 }
            /^FNF:/ { fnf += $2 }
            END {
              line_pct = (lf > 0) ? lh * 100.0 / lf : 0
              func_pct = (fnf > 0) ? fnh * 100.0 / fnf : 0
              printf "LINE_COV=%.1f\nFUNC_COV=%.1f\n", line_pct, func_pct
            }
          ' coverage.info)"

          echo "Line coverage:     ${LINE_COV}%  (minimum: ${{env.MIN_LINE_COVERAGE}}%)"
          echo "Function coverage: ${FUNC_COV}%  (minimum: ${{env.MIN_FUNC_COVERAGE}}%)"

          FAILED=0
          if ! awk "BEGIN{exit (${LINE_COV} >= ${{env.MIN_LINE_COVERAGE}}) ? 0 : 1}"; then
            echo "::error::Line coverage ${LINE_COV}% is below the minimum of ${{env.MIN_LINE_COVERAGE}}%"
            FAILED=1
          fi
          if ! awk "BEGIN{exit (${FUNC_COV} >= ${{env.MIN_FUNC_COVERAGE}}) ? 0 : 1}"; then
            echo "::error::Function coverage ${FUNC_COV}% is below the minimum of ${{env.MIN_FUNC_COVERAGE}}%"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "Coverage check passed: lines=${LINE_COV}%, functions=${FUNC_COV}%"

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{github.workspace}}/build/coverage_html/
          retention-days: 30
          if-no-files-found: error

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        name: Check out repository code

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo ./acprep dependencies
          # dpkg-dev provides dpkg-shlibdeps (for CPACK_DEBIAN_PACKAGE_SHLIBDEPS)
          # rpm provides rpmbuild (for RPM generation)
          sudo apt-get install -y dpkg-dev rpm

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Build DEB package
        working-directory: build
        run: cpack -G DEB --verbose

      - name: Build RPM package
        working-directory: build
        run: cpack -G RPM --verbose

      - name: Verify DEB package
        working-directory: build
        run: |
          echo "=== DEB package info ==="
          dpkg-deb --info *.deb
          echo ""
          echo "=== DEB package contents ==="
          dpkg-deb --contents *.deb

      - name: Verify RPM package
        working-directory: build
        run: |
          echo "=== RPM package info ==="
          rpm -qip *.rpm
          echo ""
          echo "=== RPM package contents ==="
          rpm -qlp *.rpm

      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: |
            build/*.deb
            build/*.rpm
          retention-days: 30
          if-no-files-found: error

  doxygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        name: Check out repository code

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo ./acprep dependencies
          sudo apt-get install -y doxygen graphviz

      - name: Install lefthook
        run: npm install -g lefthook

      - name: Build Doxygen documentation
        run: lefthook run cmake-doxygen
        env:
          cmakeFlags: "-DUSE_DOXYGEN=ON"

      - uses: actions/upload-artifact@v7
        with:
          name: doxygen-html
          path: ${{github.workspace}}/build/doc/html/
          retention-days: 30
          if-no-files-found: error

  manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        name: Check out repository code

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo ./acprep dependencies
          sudo apt-get install -y texinfo texlive

      - name: Install lefthook
        run: npm install -g lefthook

      - name: Build PDF manual and info pages
        run: lefthook run cmake-manual
        env:
          cmakeFlags: "-DBUILD_DOCS=ON"

      - uses: actions/upload-artifact@v7
        with:
          name: ledger-manual
          path: |
            ${{github.workspace}}/build/doc/ledger3.pdf
            ${{github.workspace}}/build/doc/ledger3.info
          retention-days: 30
          if-no-files-found: error
